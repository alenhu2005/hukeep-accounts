<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>記帳本</title>
  <script>
    // Apply theme immediately to avoid flash
    (function(){ if(localStorage.getItem('theme')==='dark') document.documentElement.classList.add('dark'); })();
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <!-- Loading -->
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
    <span style="font-size:13px;color:var(--text-muted)">載入資料中…</span>
  </div>

  <!-- Toast -->
  <div id="toast-container"></div>
  <div id="update-badge" style="display:none;position:fixed;top:12px;left:50%;transform:translateX(-50%);
    background:#1d4ed8;color:#fff;border-radius:99px;padding:5px 14px;font-size:12px;font-weight:600;
    z-index:600;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.2)">
    ✦ 資料已更新
  </div>

  <!-- Edit record dialog -->
  <div id="edit-overlay" onclick="if(event.target===this)closeEditRecord()">
    <div class="edit-dialog">
      <h3>編輯紀錄</h3>
      <div class="form-group">
        <label class="form-label">日期</label>
        <input type="date" id="edit-date" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">備注</label>
        <input type="text" id="edit-note" class="form-input" placeholder="選填">
      </div>
      <div class="form-group" id="edit-category-group">
        <label class="form-label" style="display:flex;align-items:center;gap:6px">
          分類
          <span style="font-size:11px;font-weight:400;color:var(--text-muted);background:var(--bg-tertiary);padding:1px 6px;border-radius:8px">AI 自動</span>
        </label>
        <select id="edit-category" class="form-input">
          <option value="">（未分類）</option>
          <option value="餐飲">🍽 餐飲</option>
          <option value="交通">🚌 交通</option>
          <option value="購物">🛍 購物</option>
          <option value="娛樂">🎉 娛樂</option>
          <option value="生活">🏠 生活</option>
          <option value="其他">📦 其他</option>
        </select>
      </div>
      <div class="dialog-actions">
        <button class="btn btn-outline" onclick="closeEditRecord()">取消</button>
        <button class="btn btn-primary" onclick="submitEditRecord()">儲存</button>
      </div>
    </div>
  </div>

  <!-- Confirm dialog -->
  <div id="dialog-overlay" onclick="if(event.target===this)cancelDialog()">
    <div class="dialog">
      <h3 id="dlg-title"></h3>
      <p id="dlg-desc"></p>
      <div class="dialog-actions">
        <button class="btn btn-outline" onclick="cancelDialog()">取消</button>
        <button class="btn btn-destructive" id="dlg-ok">確定</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════ PAGE: 日常 ═══════════════ -->
  <div id="page-home" class="page active">
    <header class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </div>
      <h1>記帳本</h1>
      <div class="header-meta" id="home-count">0 筆</div>
      <button id="theme-toggle" onclick="toggleTheme()" title="深色模式">
        <svg id="theme-icon" viewBox="0 0 24 24"></svg>
      </button>
    </header>
    <div class="main">

      <!-- Balance card -->
      <div class="card" id="balance-card">
        <div class="balance-bar" id="balance-bar"></div>
        <div class="balance-content">
          <div class="balance-icon" id="balance-icon-wrap">
            <svg id="balance-svg" viewBox="0 0 24 24"></svg>
          </div>
          <div>
            <div class="balance-label">目前結算</div>
            <div class="balance-main" id="balance-main">帳目已清</div>
            <div class="balance-who" id="balance-who"></div>
            <div class="balance-sub" id="balance-sub"></div>
            <button class="settle-btn" id="settle-btn" onclick="recordSettlement()">✓ 記錄還款</button>
          </div>
        </div>
      </div>

      <!-- Add expense form -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            新增消費
          </div>
          <button class="toggle-btn" onclick="toggleCollapsible('home-form','home-toggle-icon')">
            <svg id="home-toggle-icon" viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
          </button>
        </div>
        <div class="collapsible open card-body" id="home-form">
          <div class="form-group">
            <label class="form-label">消費項目</label>
            <input type="text" id="h-item" class="form-input" placeholder="例如：晚餐、衛生紙、電費">
          </div>
          <div class="form-group" id="h-amount-group">
            <label class="form-label">總金額 (NT$)</label>
            <input type="number" id="h-amount" class="form-input" placeholder="0" min="0" step="1">
          </div>
          <div class="form-group" id="h-both-group" style="display:none">
            <label class="form-label">各自出多少？</label>
            <div style="display:flex;gap:8px">
              <div style="flex:1">
                <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">胡出 (NT$)</div>
                <input type="number" id="h-paidhu" class="form-input" placeholder="0" min="0" step="1">
              </div>
              <div style="flex:1">
                <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">詹出 (NT$)</div>
                <input type="number" id="h-paidzhan" class="form-input" placeholder="0" min="0" step="1">
              </div>
            </div>
          </div>
          <div class="form-group" id="h-paidby-group">
            <label class="form-label">誰先付錢？</label>
            <div class="btn-group btn-group-2">
              <button class="btn-toggle active" id="pb-胡" onclick="setHomePaidBy('胡')">胡付的</button>
              <button class="btn-toggle"        id="pb-詹" onclick="setHomePaidBy('詹')">詹付的</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">怎麼分攤？</label>
            <div class="btn-group btn-group-4">
              <button class="btn-toggle active" id="sm-均分"  onclick="setHomeSplitMode('均分')">各付一半</button>
              <button class="btn-toggle"        id="sm-只有胡" onclick="setHomeSplitMode('只有胡')">只算胡的</button>
              <button class="btn-toggle"        id="sm-只有詹" onclick="setHomeSplitMode('只有詹')">只算詹的</button>
              <button class="btn-toggle"        id="sm-兩人付" onclick="setHomeSplitMode('兩人付')">兩人都付</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">備注（選填）</label>
            <input type="text" id="h-note" class="form-input" placeholder="例如：幫詹墊的、電費 3 月份">
          </div>
          <button class="btn btn-primary btn-full" id="h-submit" onclick="submitDailyRecord()">記起來</button>
        </div>
      </div>

      <!-- History -->
      <div>
        <div class="section-header" style="margin-bottom:8px">
          <div class="section-title">
            <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            歷史紀錄
          </div>
        </div>
        <div class="card" id="home-records"></div>
      </div>
    </div>
  </div>

  <!-- ═══════════════ PAGE: 出遊列表 ═══════════════ -->
  <div id="page-trips" class="page">
    <header class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      </div>
      <h1>出遊記帳</h1>
      <button class="btn btn-primary btn-sm" onclick="showCreateTripForm()">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        新增行程
      </button>
    </header>
    <div class="main">
      <!-- Create trip form -->
      <div class="card" id="create-trip-card" style="display:none">
        <div class="card-header">
          <div class="card-title">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            新增行程
          </div>
        </div>
        <div class="card-body">
          <div class="form-group">
            <label class="form-label">行程名稱</label>
            <input type="text" id="new-trip-name" class="form-input" placeholder="例如：墾丁三天兩夜">
          </div>
          <div class="form-group">
            <label class="form-label">成員（至少兩位）</label>
            <div class="inline-add">
              <input type="text" id="new-member-input" class="form-input" placeholder="輸入姓名後按 Enter 或點 +"
                onkeydown="if(event.key==='Enter'){event.preventDefault();addNewTripMember()}">
              <button class="btn btn-primary btn-icon" onclick="addNewTripMember()">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
              </button>
            </div>
            <div id="new-trip-member-chips" class="member-chips" style="margin-top:10px"></div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-outline" style="flex:1" onclick="hideCreateTripForm()">取消</button>
            <button class="btn btn-primary" style="flex:1" id="create-trip-btn" onclick="createTrip()">建立行程</button>
          </div>
        </div>
      </div>

      <!-- Trips list -->
      <div class="card" id="trips-list"></div>
    </div>
  </div>

  <!-- ═══════════════ PAGE: 分析 ═══════════════ -->
  <div id="page-analysis" class="page">
    <header class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M11 2v20c-5.07-.5-9-4.79-9-10s3.93-9.5 9-10zm2.03 0v8.99H22c-.47-4.74-4.24-8.52-8.97-8.99zm0 11.01V22c4.74-.47 8.5-4.25 8.97-8.99h-8.97z"/></svg>
      </div>
      <h1>消費分析</h1>
    </header>
    <div id="analysis-content" style="padding:16px 16px 100px"></div>
  </div>

  <!-- ═══════════════ PAGE: 行程詳情 ═══════════════ -->
  <div id="page-trip-detail" class="page">
    <header class="header">
      <button class="back-btn" onclick="navigate('trips')">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <h1 id="detail-name">行程</h1>
      <div class="header-meta" id="detail-count"></div>
    </header>
    <div class="main">

      <!-- Members -->
      <div class="card">
        <div class="card-body">
          <div class="form-label" style="margin-bottom:10px">成員</div>
          <div id="detail-member-chips" class="member-chips" style="margin-bottom:10px"></div>
          <div class="inline-add">
            <input type="text" id="detail-new-member" class="form-input" placeholder="新增成員姓名"
              onkeydown="if(event.key==='Enter'){event.preventDefault();addDetailMember()}">
            <button class="btn btn-outline btn-sm" onclick="addDetailMember()">
              <svg viewBox="0 0 24 24" style="width:12px;height:12px"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="currentColor"/></svg>
              新增
            </button>
          </div>
        </div>
      </div>

      <!-- Settlement -->
      <div class="card" id="settlement-card">
        <div class="balance-bar" id="settlement-bar"></div>
        <div id="settlement-body"></div>
      </div>

      <!-- Archive bar -->
      <div id="trip-archive-bar"></div>

      <!-- Add expense form -->
      <div class="card" id="add-expense-card">
        <div class="card-header">
          <div class="card-title">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            新增消費
          </div>
          <button class="toggle-btn" onclick="toggleCollapsible('detail-form','detail-toggle-icon')">
            <svg id="detail-toggle-icon" viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
          </button>
        </div>
        <div class="collapsible open card-body" id="detail-form">
          <div class="form-group">
            <label class="form-label">消費項目</label>
            <input type="text" id="d-item" class="form-input" placeholder="例如：晚餐、門票、計程車">
          </div>
          <div class="form-group" id="d-amount-group">
            <label class="form-label">總金額 (NT$)</label>
            <input type="number" id="d-amount" class="form-input" placeholder="0" min="0" step="1" oninput="updatePerPerson()">
          </div>
          <div class="form-group" id="d-multipay-group" style="display:none">
            <label class="form-label" style="display:flex;justify-content:space-between;align-items:center">
              各自出了多少？
              <button type="button" onclick="addPayerRow()" style="background:none;border:none;color:var(--primary);font-size:12px;cursor:pointer;font-weight:600">＋ 新增</button>
            </label>
            <div id="d-payers-list" style="display:flex;flex-direction:column;gap:6px"></div>
            <div id="d-multipay-total" style="font-size:12px;color:var(--text-muted);margin-top:4px"></div>
          </div>
          <div class="form-group">
            <label class="form-label">備注（選填）</label>
            <input type="text" id="d-note" class="form-input" placeholder="例如：第一天晚餐">
          </div>
          <div class="form-group">
            <label class="form-label" style="display:flex;justify-content:space-between;align-items:center">
              誰先付錢？
              <button type="button" id="d-multipay-toggle" onclick="toggleMultiPay()" style="background:none;border:1px solid var(--border);border-radius:99px;color:var(--text-muted);font-size:11px;cursor:pointer;padding:2px 8px;font-weight:500">多人出款</button>
            </label>
            <div id="d-paidby-group">
              <select id="d-paidby" class="form-select"></select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">誰要分攤？</label>
            <div id="d-split-chips" class="split-chips"></div>
            <div id="d-per-person" class="per-person-note"></div>
          </div>
          <button class="btn btn-primary btn-full" id="d-submit" onclick="submitTripExpense()">記起來</button>
        </div>
      </div>

      <!-- Expense history -->
      <div>
        <div class="section-header" style="margin-bottom:8px">
          <div class="section-title">
            <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            歷史紀錄
          </div>
        </div>
        <div class="card" id="detail-expenses"></div>
      </div>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav id="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="navigate('home')">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      日常
    </button>
    <button class="nav-btn" id="nav-trips" onclick="navigate('trips')">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      出遊
    </button>
    <button class="nav-btn" id="nav-analysis" onclick="navigate('analysis')">
      <svg viewBox="0 0 24 24"><path d="M11 2v20c-5.07-.5-9-4.79-9-10s3.93-9.5 9-10zm2.03 0v8.99H22c-.47-4.74-4.24-8.52-8.97-8.99zm0 11.01V22c4.74-.47 8.5-4.25 8.97-8.99h-8.97z"/></svg>
      分析
    </button>
  </nav>
</div>

<script src="app.js"></script>
</body>
</html>
