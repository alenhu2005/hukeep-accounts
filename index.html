<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <script>
    // GitHub Pages：若網址是 /repo 而沒有結尾 /，相對路徑 js/、css/ 會錯解析到網域根目錄 → 載入失敗
    (function () {
      if (location.protocol === 'file:') return;
      var p = location.pathname;
      if (/\/index\.html$/i.test(p)) p = p.replace(/\/index\.html$/i, '/');
      else if (p.length > 1 && !p.endsWith('/')) p += '/';
      var b = document.createElement('base');
      b.href = location.origin + (p || '/');
      var m = document.querySelector('meta[charset]');
      document.head.insertBefore(b, m ? m.nextSibling : document.head.firstChild);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>記帳本</title>
  <meta name="theme-color" content="#3b82f6" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="記帳本">
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <script>
    // Apply theme immediately to avoid flash
    (function(){ if(localStorage.getItem('theme')==='dark') document.documentElement.classList.add('dark'); })();
    // 主題色（與 css/accent-themes.css、js/accent-theme.js 同步）
    (function(){
      var ids = ['blue','teal','violet','rose','amber','emerald'];
      var a = localStorage.getItem('accent');
      document.documentElement.setAttribute('data-accent', ids.indexOf(a) >= 0 ? a : 'blue');
    })();
  </script>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/trip-lottery.css">
  <link rel="stylesheet" href="css/forms-controls.css">
  <link rel="stylesheet" href="css/records-history.css">
  <link rel="stylesheet" href="css/analysis.css">
  <link rel="stylesheet" href="css/trip-cards.css">
  <link rel="stylesheet" href="css/members-rare.css">
  <link rel="stylesheet" href="css/trip-forms-collapsible.css">
  <link rel="stylesheet" href="css/shell-nav.css">
  <link rel="stylesheet" href="css/overlays-feedback.css">
  <link rel="stylesheet" href="css/sheets-directory.css">
  <link rel="stylesheet" href="css/dark-a11y.css">
  <link rel="stylesheet" href="css/accent-themes.css">
</head>
<body>
<div id="app">

  <!-- Loading -->
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
    <span style="font-size:13px;color:var(--text-muted)">載入資料中…</span>
  </div>

  <!-- Photo lightbox -->
  <div id="photo-lightbox" class="photo-lightbox" onclick="closePhotoLightbox()">
    <button type="button" class="photo-lightbox-close" aria-label="關閉">&times;</button>
    <div id="photo-lightbox-wrap" class="photo-lightbox-wrap" onclick="event.stopPropagation()">
      <img id="photo-lightbox-img" class="photo-lightbox-img" alt="照片">
    </div>
  </div>

  <!-- 成員頭像放大預覽（成員管理列表） -->
  <div id="member-avatar-preview-overlay" class="member-avatar-preview-overlay" onclick="if(event.target===this)closeMemberAvatarPreview()">
    <div class="member-avatar-preview-panel" role="dialog" aria-modal="true" aria-labelledby="member-avatar-preview-title" onclick="event.stopPropagation()">
      <button type="button" class="member-avatar-preview-close" onclick="closeMemberAvatarPreview()" aria-label="關閉">&times;</button>
      <div id="member-avatar-preview-inner" class="member-avatar-preview-inner"></div>
      <p id="member-avatar-preview-title" class="member-avatar-preview-title"></p>
      <button type="button" class="btn btn-outline member-avatar-preview-change" onclick="memberAvatarPreviewChangePhoto()">更換頭像</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container"></div>
  <div id="update-badge" class="update-badge" role="status" aria-live="polite">
    <span class="update-badge-dot" aria-hidden="true"></span>
    資料已更新
  </div>

  <!-- 主題色 -->
  <div id="accent-menu-overlay" onclick="if(event.target===this)closeAccentMenu()" aria-hidden="true">
    <div class="accent-menu" role="dialog" aria-modal="true" aria-labelledby="accent-menu-title" onclick="event.stopPropagation()">
      <div class="accent-menu-header">
        <h3 id="accent-menu-title">主題色</h3>
        <button type="button" class="accent-menu-close" onclick="closeAccentMenu()" aria-label="關閉">&times;</button>
      </div>
      <div class="accent-menu-grid" role="listbox" aria-label="選擇主題色">
        <button type="button" class="accent-menu-btn" data-accent-id="blue" role="option" onclick="setAccentTheme('blue')">
          <span class="accent-swatch" style="background:#3b82f6" aria-hidden="true"></span>
          標準藍
        </button>
        <button type="button" class="accent-menu-btn" data-accent-id="teal" role="option" onclick="setAccentTheme('teal')">
          <span class="accent-swatch" style="background:#0d9488" aria-hidden="true"></span>
          青綠
        </button>
        <button type="button" class="accent-menu-btn" data-accent-id="violet" role="option" onclick="setAccentTheme('violet')">
          <span class="accent-swatch" style="background:#7c3aed" aria-hidden="true"></span>
          紫羅蘭
        </button>
        <button type="button" class="accent-menu-btn" data-accent-id="rose" role="option" onclick="setAccentTheme('rose')">
          <span class="accent-swatch" style="background:#e11d48" aria-hidden="true"></span>
          玫瑰紅
        </button>
        <button type="button" class="accent-menu-btn" data-accent-id="amber" role="option" onclick="setAccentTheme('amber')">
          <span class="accent-swatch" style="background:#d97706" aria-hidden="true"></span>
          琥珀
        </button>
        <button type="button" class="accent-menu-btn" data-accent-id="emerald" role="option" onclick="setAccentTheme('emerald')">
          <span class="accent-swatch" style="background:#059669" aria-hidden="true"></span>
          翠綠
        </button>
      </div>
    </div>
  </div>

  <!-- Edit record dialog -->
  <div id="edit-overlay" onclick="if(event.target===this)closeEditRecord()">
    <div class="edit-dialog" role="dialog" aria-modal="true" aria-labelledby="edit-dialog-title">
      <div class="edit-dialog-header">
        <h3 id="edit-dialog-title">編輯紀錄</h3>
        <button type="button" class="edit-dialog-close" onclick="closeEditRecord()" aria-label="關閉" title="關閉">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div id="edit-summary" class="edit-summary"></div>
      <div class="form-group" id="edit-category-group">
        <label class="form-label" style="display:flex;align-items:center;gap:6px">
          分類
          <span style="font-size:11px;font-weight:400;color:var(--text-muted);background:var(--bg-tertiary);padding:1px 6px;border-radius:8px">AI 自動</span>
        </label>
        <select id="edit-category" class="form-input">
          <option value="">（未分類）</option>
          <option value="餐飲">🍽 餐飲</option>
          <option value="交通">🚌 交通</option>
          <option value="購物">🛍 購物</option>
          <option value="娛樂">🎉 娛樂</option>
          <option value="生活">🏠 生活</option>
          <option value="賭博">🎰 賭博</option>
          <option value="其他">📦 其他</option>
        </select>
      </div>
      <div class="form-group" id="edit-trip-amount-group" style="display:none">
        <label class="form-label" for="edit-trip-amount">新台幣金額</label>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">若覺得換算或刷卡金額不對，請改為實際新台幣總額</div>
        <input
          type="text"
          id="edit-trip-amount"
          class="form-input form-input-amount"
          placeholder="0"
          inputmode="numeric"
          enterkeyhint="done"
          aria-label="出遊消費新台幣金額"
        >
      </div>
      <div class="form-group" id="edit-note-photo-group">
        <label class="form-label">備注</label>
        <div class="edit-note-photo-row">
          <input type="text" id="edit-note" class="form-input" placeholder="選填">
          <button
            type="button"
            id="edit-photo-btn"
            class="edit-photo-btn"
            onclick="openEditPhotoPicker()"
            aria-label="拍照上傳照片"
            title="拍照上傳"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 7l1-2h4l1 2h3a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h3zm3 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10z"/></svg>
          </button>
        </div>
        <input
          type="file"
          id="edit-photo-input"
          accept="image/*"
          style="display:none"
          onchange="handleEditPhotoSelected(event)"
        >
        <div class="edit-photo-preview-row">
          <img id="edit-photo-preview" class="edit-photo-preview hidden" alt="照片預覽" onclick="openPhotoLightbox(this.src)" style="cursor:pointer" title="點擊放大">
          <button
            type="button"
            id="edit-photo-remove-btn"
            class="btn btn-outline btn-sm"
            style="display:none"
            onclick="removeEditPhoto()"
          >
            移除
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">日期</label>
        <input type="date" id="edit-date" class="form-input">
      </div>
      <div class="dialog-actions">
        <button type="button" class="btn btn-destructive" id="edit-void-btn" onclick="voidEditingRecord()" style="display:none">撤回</button>
        <button class="btn btn-outline" onclick="closeEditRecord()">取消</button>
        <button type="button" class="btn btn-primary" id="edit-submit-btn" onclick="submitEditRecord()">儲存</button>
      </div>
    </div>
  </div>

  <!-- Avatar uploader (trip members: global, once upload then reuse) -->
  <input
    type="file"
    id="avatar-upload-input"
    accept="image/*"
    style="display:none"
    onchange="handleAvatarSelected(event)"
  >

  <!-- Confirm dialog -->
  <div id="dialog-overlay" onclick="if(event.target===this)cancelDialog()">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="dlg-title">
      <h3 id="dlg-title"></h3>
      <p id="dlg-desc"></p>
      <div class="dialog-actions">
        <button class="btn btn-outline" onclick="cancelDialog()">取消</button>
        <button class="btn btn-destructive" id="dlg-ok">確定</button>
      </div>
    </div>
  </div>

  <!-- Single-button alert (e.g. hidden member color) -->
  <div id="alert-overlay">
    <div class="dialog alert-dialog" role="alertdialog" aria-modal="true" aria-labelledby="alert-dlg-title" onclick="event.stopPropagation()">
      <h3 id="alert-dlg-title"></h3>
      <p id="alert-dlg-desc"></p>
      <button type="button" class="btn btn-primary" id="alert-dlg-ok">知道了</button>
    </div>
  </div>

  <!-- Backup sheet -->
  <div id="backup-overlay" onclick="if(event.target===this)closeBackupMenu()">
    <div class="edit-dialog backup-dialog" role="dialog" aria-modal="true" aria-labelledby="backup-dialog-title" onclick="event.stopPropagation()">
      <h3 id="backup-dialog-title">備份與匯出</h3>
      <p class="backup-hint">可讀版含中文欄與摘要；還原試算表或與後端對接請用原始格式。</p>
      <div class="backup-sheet-actions">
        <button type="button" class="btn btn-primary btn-full" onclick="exportBackupCSV(); closeBackupMenu()">下載可讀版 CSV</button>
        <button type="button" class="btn btn-outline btn-full" onclick="copyBackupText().then(() => closeBackupMenu())">複製文字備份</button>
        <button type="button" class="btn btn-ghost btn-full backup-tech-btn" onclick="exportTechnicalCSV(); closeBackupMenu()">下載原始格式 CSV（技術用）</button>
      </div>
      <button type="button" class="btn btn-outline btn-full backup-close-btn" onclick="closeBackupMenu()">關閉</button>
      <button type="button" class="clear-cache-link" onclick="clearLocalCache()">清除本地快取</button>
    </div>
  </div>

  <!-- ═══════════════ PAGE: 日常 ═══════════════ -->
  <div id="page-home" class="page active">
    <header class="header">
      <button type="button" class="header-icon" onclick="toggleAccentMenu(event)" title="主題色" aria-label="主題色">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </button>
      <h1>記帳本</h1>
      <div class="header-meta" id="home-count">0 筆</div>
      <div class="header-tools">
        <button type="button" id="backup-open-btn" class="header-icon-btn" onclick="openBackupMenu()" title="備份與匯出" aria-label="備份與匯出">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2zm-6 .67l2.59-2.58L17 11.5l-5 5-5-5 1.41-1.41L11 12.67V3h2z"/></svg>
        </button>
        <button type="button" id="theme-toggle" onclick="toggleTheme()" title="深色模式">
          <svg id="theme-icon" viewBox="0 0 24 24"></svg>
        </button>
      </div>
    </header>
    <div class="main">

      <!-- Balance card -->
      <div class="card" id="balance-card">
        <div class="balance-bar" id="balance-bar"></div>
        <div class="balance-content">
          <div class="balance-icon" id="balance-icon-wrap">
            <svg id="balance-svg" viewBox="0 0 24 24"></svg>
          </div>
          <div>
            <div class="balance-label">目前結算</div>
            <div class="balance-main" id="balance-main">帳目已清</div>
            <div class="balance-who" id="balance-who"></div>
            <div class="balance-sub" id="balance-sub"></div>
            <button class="settle-btn" id="settle-btn" onclick="recordSettlement()">✓ 還款</button>
          </div>
        </div>
      </div>

      <!-- Add expense form -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            新增消費
          </div>
          <button class="toggle-btn" onclick="toggleCollapsible('home-form','home-toggle-icon')">
            <svg id="home-toggle-icon" viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
          </button>
        </div>
        <div id="home-form" class="collapsible-panel is-open">
          <div class="collapsible-panel__inner card-body">
          <div class="form-group">
            <label class="form-label">消費項目</label>
            <input type="text" id="h-item" class="form-input" placeholder="輸入項目"
              enterkeyhint="next" onkeydown="focusAmountAfterHomeItem(event)">
          </div>
          <div class="form-group" id="h-amount-group">
            <label class="form-label">總金額 (NT$)</label>
            <input type="text" id="h-amount" class="form-input form-input-amount" placeholder="0"
              lang="en" spellcheck="false" autocapitalize="off" autocorrect="off" autocomplete="off"
              inputmode="numeric" pattern="[0-9]*" enterkeyhint="done" aria-label="總金額">
          </div>
          <div class="form-group" id="h-both-group" style="display:none">
            <label class="form-label">各自出多少？</label>
            <div style="display:flex;gap:8px">
              <div style="flex:1">
                <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">胡出 (NT$)</div>
                <input type="text" id="h-paidhu" class="form-input form-input-amount" placeholder="0"
                  lang="en" spellcheck="false" autocapitalize="off" autocorrect="off" autocomplete="off"
                  inputmode="numeric" pattern="[0-9]*" enterkeyhint="next" aria-label="胡出金額"
                  onkeydown="focusNextInBothPayHome(event)">
              </div>
              <div style="flex:1">
                <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">詹出 (NT$)</div>
                <input type="text" id="h-paidzhan" class="form-input form-input-amount" placeholder="0"
                  lang="en" spellcheck="false" autocapitalize="off" autocorrect="off" autocomplete="off"
                  inputmode="numeric" pattern="[0-9]*" enterkeyhint="next" aria-label="詹出金額"
                  onkeydown="focusNextInBothPayHome(event)">
              </div>
            </div>
          </div>
          <div class="form-group" id="h-paidby-group">
            <label class="form-label">誰先付錢？</label>
            <div class="btn-group btn-group-2">
              <button class="btn-toggle active" id="pb-胡" onclick="setHomePaidBy('胡')">胡付的</button>
              <button class="btn-toggle"        id="pb-詹" onclick="setHomePaidBy('詹')">詹付的</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">怎麼分攤？</label>
            <div class="btn-group btn-group-4">
              <button class="btn-toggle active" id="sm-均分"  onclick="setHomeSplitMode('均分')">各付一半</button>
              <button class="btn-toggle"        id="sm-只有胡" onclick="setHomeSplitMode('只有胡')">只算胡的</button>
              <button class="btn-toggle"        id="sm-只有詹" onclick="setHomeSplitMode('只有詹')">只算詹的</button>
              <button class="btn-toggle"        id="sm-兩人付" onclick="setHomeSplitMode('兩人付')">兩人都付</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">備注（選填）</label>
            <input type="text" id="h-note" class="form-input" placeholder="輸入備註">
          </div>
          <button class="btn btn-primary btn-full" id="h-submit" onclick="submitDailyRecord()">記起來</button>
          </div>
        </div>
      </div>

      <!-- History -->
      <div>
        <div class="section-header" style="margin-bottom:8px">
          <div class="section-title">
            <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            歷史紀錄
          </div>
          <button type="button" class="btn btn-outline btn-sm home-calendar-open-btn" id="home-calendar-open-btn" onclick="toggleHomeCalendarModal()" aria-label="開啟月曆" aria-expanded="false" aria-controls="home-calendar-modal">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
            月曆
          </button>
        </div>
        <div class="card home-history-card" id="home-history">
          <div class="home-records-wrap" id="home-records"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 日常：月曆彈層（#home-calendar 由 JS 填入） -->
  <div class="home-cal-modal-overlay" id="home-calendar-modal-overlay" onclick="if(event.target===this)closeHomeCalendarModal()" aria-hidden="true">
    <div class="home-cal-modal-sheet" id="home-calendar-modal" role="dialog" aria-modal="true" aria-labelledby="home-cal-modal-title" aria-hidden="true" onclick="event.stopPropagation()">
      <div class="home-cal-modal-header">
        <h2 id="home-cal-modal-title" class="home-cal-modal-title">依日期瀏覽</h2>
        <button type="button" class="member-dir-close" onclick="closeHomeCalendarModal()" aria-label="關閉">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div id="home-calendar" class="home-calendar" aria-label="依日期瀏覽"></div>
    </div>
  </div>

  <!-- ═══════════════ PAGE: 出遊列表 ═══════════════ -->
  <div id="page-trips" class="page">
    <header class="header">
      <button type="button" class="header-icon" onclick="toggleAccentMenu(event)" title="主題色" aria-label="主題色">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      </button>
      <h1>出遊記帳</h1>
      <button class="btn btn-primary btn-sm" onclick="showCreateTripForm()">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        新增行程
      </button>
    </header>
    <div class="main">
      <!-- Create trip form -->
      <div class="card" id="create-trip-card" style="display:none">
        <div class="card-header">
          <div class="card-title">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            新增行程
          </div>
        </div>
        <div class="card-body">
          <div class="form-group">
            <label class="form-label">行程名稱</label>
            <input type="text" id="new-trip-name" class="form-input" placeholder="輸入行程名稱">
          </div>
          <div class="form-group">
            <label class="form-label">成員（至少兩位）</label>
            <div id="known-member-picker"></div>
            <div class="inline-add">
              <input type="text" id="new-member-input" class="form-input" placeholder="輸入新成員姓名"
                onkeydown="if(event.key==='Enter'){event.preventDefault();addNewTripMember()}">
              <button class="btn btn-primary btn-icon" onclick="addNewTripMember()">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
              </button>
            </div>
            <div id="new-trip-member-chips" class="member-chips" style="margin-top:10px"></div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-outline" style="flex:1" onclick="hideCreateTripForm()">取消</button>
            <button class="btn btn-primary" style="flex:1" id="create-trip-btn" onclick="createTrip()">建立行程</button>
          </div>
        </div>
      </div>

      <!-- Trips list -->
      <div class="card" id="trips-list"></div>
    </div>
    <!-- FAB: member directory -->
    <button type="button" class="member-dir-fab" id="member-dir-fab" onclick="toggleMemberDirectory()" title="成員管理" aria-label="成員管理">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
    </button>
  </div>

  <!-- Member directory panel (shared overlay) -->
  <div class="member-dir-overlay" id="member-dir-overlay" onclick="closeMemberDirectory()"></div>
  <div class="member-dir-panel" id="member-dir-panel">
    <div class="member-dir-header">
      <h2
        onclick="hiddenPreviewSecretTap()"
        onmousedown="hiddenPreviewSecretPressStart()"
        onmouseup="hiddenPreviewSecretPressEnd()"
        ontouchstart="hiddenPreviewSecretPressStart()"
        ontouchend="hiddenPreviewSecretPressEnd()"
        title="成員管理"
      >成員管理</h2>
      <button type="button" class="member-dir-close" onclick="closeMemberDirectory()" aria-label="關閉">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="member-dir-body" id="member-dir-body"></div>
  </div>

  <!-- Hidden style preview -->
  <div class="member-preview-overlay" id="member-preview-overlay" onclick="if(event.target===this)closeHiddenStylePreview()">
    <div class="member-preview-panel" role="dialog" aria-modal="true" aria-labelledby="member-preview-title" onclick="event.stopPropagation()">
      <div class="member-preview-header">
        <h3 id="member-preview-title">隱藏款預覽</h3>
        <button type="button" class="member-dir-close" onclick="closeHiddenStylePreview()" aria-label="關閉">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="member-preview-body" id="member-preview-body"></div>
    </div>
  </div>

  <!-- 出遊統計（頂欄「統計」彈窗） -->
  <div class="member-preview-overlay" id="trip-stats-modal-overlay" onclick="if(event.target===this)closeTripStatsModal()">
    <div class="member-preview-panel" role="dialog" aria-modal="true" aria-labelledby="trip-stats-modal-title" onclick="event.stopPropagation()">
      <div class="member-preview-header">
        <h3 id="trip-stats-modal-title">出遊統計</h3>
        <button type="button" class="member-dir-close" onclick="closeTripStatsModal()" aria-label="關閉">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="member-preview-body" id="trip-stats-modal-body"></div>
    </div>
  </div>

  <!-- ═══════════════ PAGE: 分析 ═══════════════ -->
  <div id="page-analysis" class="page">
    <header class="header">
      <button type="button" class="header-icon" onclick="toggleAccentMenu(event)" title="主題色" aria-label="主題色">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 2v20c-5.07-.5-9-4.79-9-10s3.93-9.5 9-10zm2.03 0v8.99H22c-.47-4.74-4.24-8.52-8.97-8.99zm0 11.01V22c4.74-.47 8.5-4.25 8.97-8.99h-8.97z"/></svg>
      </button>
      <h1>消費分析</h1>
    </header>
    <div id="analysis-content" style="padding:16px 16px 100px"></div>
  </div>

  <!-- ═══════════════ PAGE: 行程詳情 ═══════════════ -->
  <div id="page-trip-detail" class="page">
    <header class="header">
      <button class="back-btn" onclick="navigate('trips')">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <h1 id="detail-name">行程</h1>
      <div class="header-meta" id="detail-count"></div>
      <button type="button" class="header-icon-btn trip-header-stats-btn" onclick="openTripStatsModal()" title="出遊統計" aria-label="開啟出遊統計">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true"><path d="M11 2v20c-5.07-.5-9-4.79-9-10s3.93-9.5 9-10zm2.03 0v8.99H22c-.47-4.74-4.24-8.52-8.97-8.99zm0 11.01V22c4.74-.47 8.5-4.25 8.97-8.99h-8.97z"/></svg>
      </button>
      <button type="button" id="trip-lottery-trigger" class="header-icon-btn trip-lottery-trigger" onclick="toggleTripLotteryPanel(event)" title="抽籤" aria-label="抽籤" aria-expanded="false" aria-controls="trip-lottery-popover" style="display:none">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM7.5 18c-.83 0-1.5-.67-1.5-1.5S6.67 15 7.5 15s1.5.67 1.5 1.5S8.33 18 7.5 18zm0-9C6.67 9 6 8.33 6 7.5S6.67 6 7.5 6 9 6.67 9 7.5 8.33 9 7.5 9zm4.5 4.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4.5 4.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm0-9c-.83 0-1.5-.67-1.5-1.5S15.67 6 16.5 6s1.5.67 1.5 1.5S17.33 9 16.5 9z"/></svg>
      </button>
      <div id="trip-header-actions" class="header-tools"></div>
    </header>
    <div id="trip-lottery-popover" class="trip-lottery-popover" hidden></div>
    <div class="main">

      <!-- Members -->
      <div class="card">
        <div class="card-body">
          <div class="form-label" style="margin-bottom:10px">成員</div>
          <div id="detail-member-chips" class="member-chips" style="margin-bottom:10px"></div>
          <div id="detail-known-members"></div>
          <div class="inline-add">
            <input type="text" id="detail-new-member" class="form-input" placeholder="輸入新成員姓名"
              onkeydown="if(event.key==='Enter'){event.preventDefault();addDetailMember()}">
            <button class="btn btn-outline btn-sm" onclick="addDetailMember()">
              <svg viewBox="0 0 24 24" style="width:12px;height:12px"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="currentColor"/></svg>
              新增
            </button>
          </div>
        </div>
      </div>

      <!-- Settlement -->
      <div class="card" id="settlement-card">
        <div class="balance-bar" id="settlement-bar"></div>
        <div id="settlement-body"></div>
      </div>

      <!-- Archive bar -->
      <div id="trip-archive-bar"></div>

      <!-- Add expense form -->
      <div class="card" id="add-expense-card">
        <div class="card-header card-header--toggle-row" id="detail-form-header-toggle" role="button" tabindex="0" aria-expanded="true" aria-controls="detail-form" title="收合／展開新增消費" onclick="tripDetailFormHeaderClick(event)" onkeydown="tripDetailFormHeaderKeydown(event)">
          <div class="card-title">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            新增消費
          </div>
          <div class="card-header-trail">
            <button type="button" id="d-gambling-toggle" class="btn btn-outline btn-sm d-gambling-toggle" onclick="event.stopPropagation(); toggleDetailGamblingMode()" aria-pressed="false" title="切換賭博模式（文案與分類為賭博）">賭博模式</button>
            <span class="toggle-btn toggle-btn--header-decor" aria-hidden="true">
              <svg id="detail-toggle-icon" viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
            </span>
          </div>
        </div>
        <div id="detail-form" class="collapsible-panel is-open">
          <div class="collapsible-panel__inner card-body">
          <div class="form-group">
            <label class="form-label">消費項目</label>
            <input type="text" id="d-item" class="form-input" placeholder="輸入項目"
              enterkeyhint="next" onkeydown="focusAmountAfterTripItem(event)">
          </div>
          <div class="form-group" id="d-amount-group">
            <label class="form-label" id="d-amount-label">總金額</label>
            <input type="hidden" id="d-cny-rate" value="" aria-hidden="true">
            <div class="detail-amount-row">
              <input type="text" id="d-amount" class="form-input form-input-amount detail-amount-input" placeholder="0"
                lang="en" spellcheck="false" autocapitalize="off" autocorrect="off" autocomplete="off"
                inputmode="numeric" pattern="[0-9]*" enterkeyhint="done" aria-label="金額（新台幣）"
                onfocus="beginDetailTotalEdit()"
                onblur="endDetailTotalEdit()"
                oninput="handleDetailTotalInput(this.value)">
              <div id="d-amount-currency-wrap" class="detail-amount-currency-wrap" style="display:none">
                <button type="button" id="d-currency-toggle" class="detail-currency-toggle" onclick="toggleDetailAmountCurrency()">NT$</button>
              </div>
              <span id="d-cny-rate-inline" class="detail-cny-rate-inline" style="display:none" aria-live="polite"></span>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" style="display:flex;justify-content:space-between;align-items:center">
              <span id="d-label-paidby">誰先付錢？</span>
              <button type="button" id="d-multipay-toggle" onclick="toggleMultiPay()" style="background:none;border:1px solid var(--border);border-radius:99px;color:var(--text-muted);font-size:11px;cursor:pointer;padding:2px 8px;font-weight:500"><span id="d-label-multipay-toggle">多人出款</span></button>
            </label>
            <div id="d-paidby-group">
              <div id="d-paidby-toggles" class="btn-group btn-group-payer" role="group" aria-label="誰先付錢"></div>
            </div>
            <div id="d-multipay-group" style="display:none; margin-top:10px">
              <label class="form-label" style="display:flex;justify-content:space-between;align-items:center">
                <span id="d-label-payers-sub">各自出了多少？</span>
                <button type="button" id="d-add-payer-row-btn" onclick="addPayerRow()" style="background:none;border:none;color:var(--primary);font-size:12px;cursor:pointer;font-weight:600">＋ 新增</button>
              </label>
              <div id="d-payers-list" class="payer-list"></div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" style="display:flex;justify-content:space-between;align-items:center">
              <span id="d-label-split">誰要分攤？</span>
              <button type="button" id="d-split-mode-toggle" onclick="toggleDetailSplitMode()" style="background:none;border:1px solid var(--border);border-radius:99px;color:var(--text-muted);font-size:11px;cursor:pointer;padding:2px 8px;font-weight:500"><span id="d-label-split-mode">詳細分攤</span></button>
            </label>
            <div id="d-split-chips" class="split-chips"></div>
            <div id="d-split-custom-list" class="split-custom-list" style="display:none"></div>
            <div id="d-per-person" class="per-person-note"></div>
          </div>
          <div class="form-group">
            <label class="form-label">備注（選填）</label>
            <input type="text" id="d-note" class="form-input" placeholder="輸入備註">
          </div>
          <button class="btn btn-primary btn-full" id="d-submit" onclick="submitTripExpense()">記起來</button>
          </div>
        </div>
      </div>

      <!-- Expense history -->
      <div class="card" id="detail-expenses-card">
        <button type="button" class="card-header card-header--toggle" id="detail-expenses-header-toggle" onclick="toggleCollapsible('detail-expenses-panel','detail-expenses-toggle-icon','detail-expenses-header-toggle')" aria-expanded="true" aria-controls="detail-expenses-panel" title="收合／展開歷史紀錄">
          <span class="card-title-block">
            <span class="card-title">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
              歷史紀錄
            </span>
            <span id="trip-history-range-meta" class="trip-history-header-meta" hidden aria-live="polite"></span>
          </span>
          <span class="card-header-trail">
            <span class="detail-expenses-hint">上方選日期／分組</span>
            <span class="toggle-btn toggle-btn--header-decor" aria-hidden="true">
              <svg id="detail-expenses-toggle-icon" viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
            </span>
          </span>
        </button>
        <div id="detail-expenses-panel" class="collapsible-panel is-open">
          <div class="collapsible-panel__inner detail-expenses-panel-inner">
            <div id="detail-expenses"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="sync-status-bar" class="sync-status-bar" role="status" aria-live="polite">
    <span class="sync-status-badge"></span>
    <span class="sync-status-text"></span>
  </div>

  <!-- Bottom nav -->
  <nav id="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="navigate('home')">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      日常
    </button>
    <button class="nav-btn" id="nav-trips" onclick="navigate('trips')">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      出遊
    </button>
    <button class="nav-btn" id="nav-analysis" onclick="navigate('analysis')">
      <svg viewBox="0 0 24 24"><path d="M11 2v20c-5.07-.5-9-4.79-9-10s3.93-9.5 9-10zm2.03 0v8.99H22c-.47-4.74-4.24-8.52-8.97-8.99zm0 11.01V22c4.74-.47 8.5-4.25 8.97-8.99h-8.97z"/></svg>
      分析
    </button>
  </nav>

  <div id="trip-number-bomb-overlay" class="trip-number-bomb-overlay" hidden></div>
</div>

<script type="module" src="js/main.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker
        .register('sw.js')
        .then(function (reg) {
          try { reg.update(); } catch (e) {}
        })
        .catch(function () {});
    });
  }
</script>
</body>
</html>
